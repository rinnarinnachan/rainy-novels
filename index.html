<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Novel Hub Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#050a19,#0b1a3a);
color:white;
}

/* HEADER */
header{
background:#0b1a3a;
padding:20px;
text-align:center;
}

.logo{
font-size:34px;
color:#4cc9f0;
font-weight:bold;
text-shadow:0 0 12px #4cc9f0;
}

.tagline{font-size:13px;color:#bde0fe}

/* HERO */
.hero{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.heroCard{
min-width:200px;
background:#0f1c3a;
padding:10px;
border-radius:10px;
cursor:pointer;
}

/* LAYOUT */
.container{display:flex;gap:15px;padding:15px}
.main{flex:3}
.side{flex:1;background:#0f1c3a;padding:10px;border-radius:10px}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.card{
background:#0f1c3a;
padding:10px;
border-radius:10px;
cursor:pointer;
border:1px solid #1d2b4a;
}

.card:hover{box-shadow:0 0 10px #4cc9f0}

/* PAGE */
.page{display:none;background:#0f1c3a;padding:15px;border-radius:10px}

/* INPUT */
input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
}

/* BUTTON */
button{
background:#4cc9f0;
border:none;
padding:8px;
margin:5px;
border-radius:5px;
cursor:pointer;
}

/* COMMENT */
.comment{
background:#08122b;
padding:5px;
margin-top:5px;
font-size:12px;
}

/* LOGIN BOX */
.loginBox{
background:#08122b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">MY NOVEL HUB PRO</div>
<div class="tagline">Read • Rate • Comment • Explore</div>
</header>

<!-- LOGIN -->
<div class="loginBox">
<input id="username" placeholder="Enter username">
<button onclick="login()">Login</button>
<p id="userStatus"></p>
</div>

<!-- HERO -->
<div class="hero" id="hero"></div>

<div class="container">

<div class="main">

<input id="search" placeholder="Search novels...">

<select id="filter" onchange="renderAll()">
<option value="all">All</option>
<option value="Fantasy">Fantasy</option>
<option value="Action">Action</option>
<option value="Romance">Romance</option>
</select>

<div class="grid" id="grid"></div>

<!-- NOVEL PAGE -->
<div id="novelPage" class="page">
<button onclick="backHome()">⬅ Back</button>

<h2 id="novelTitle"></h2>
<p>⭐ Rating: <span id="rating"></span></p>

<input id="rateInput" type="number" min="1" max="5" placeholder="Rate 1-5">
<button onclick="rateNovel()">Rate</button>

<h3>Chapters</h3>
<div id="chapters"></div>
</div>

<!-- CHAPTER -->
<div id="chapterPage" class="page">

<button onclick="backNovel()">⬅ Back</button>

<h2 id="chapterTitle"></h2>
<p id="chapterText"></p>

<h3>Comments</h3>
<input id="commentInput" placeholder="Write comment...">
<button onclick="addComment()">Add Comment</button>
<div id="comments"></div>

</div>

</div>

<!-- SIDE -->
<div class="side">
<h3>Favorites</h3>
<div id="favorites"></div>
</div>

</div>

<script>

/* ================= USERS ================= */
let currentUser = null;

function login(){
let u=document.getElementById("username").value;
if(!u)return;

currentUser=u;
localStorage.setItem("user",u);
document.getElementById("userStatus").innerText="Logged in as "+u;
}

currentUser=localStorage.getItem("user")||null;

/* ================= DATA ================= */
let novels=[
{title:"Shadow Rain",cat:"Fantasy",rating:4,ratings:[],chapters:["Ch1 intro","Ch2 power"]},
{title:"Blue Abyss",cat:"Action",rating:5,ratings:[],chapters:["Ch1 abyss","Ch2 voices"]}
];

let currentNovel=null;
let currentChapter=0;

/* ================= INIT ================= */
function renderAll(){
renderHero();
renderGrid();
renderFav();
}
renderAll();

/* ================= HERO ================= */
function renderHero(){
let hero=document.getElementById("hero");
hero.innerHTML="";
novels.forEach((n,i)=>{
hero.innerHTML+=`
<div class="heroCard" onclick="openNovel(${i})">
<h4>${n.title}</h4>
<p>${n.cat}</p>
</div>`;
});
}

/* ================= GRID ================= */
function renderGrid(){
let g=document.getElementById("grid");
let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

g.innerHTML="";

novels.forEach((n,i)=>{
if((f=="all"||n.cat==f)&&n.title.toLowerCase().includes(s)){
g.innerHTML+=`
<div class="card" onclick="openNovel(${i})">
<h4>${n.title}</h4>
<p>⭐ ${n.rating}</p>
<p>${n.cat}</p>
</div>`;
}
});
}

/* ================= NOVEL ================= */
function openNovel(i){
currentNovel=i;
document.getElementById("grid").style.display="none";
document.getElementById("novelPage").style.display="block";

document.getElementById("novelTitle").innerText=novels[i].title;
document.getElementById("rating").innerText=novels[i].rating;

renderChapters();
}

/* ================= CHAPTERS ================= */
function renderChapters(){
let box=document.getElementById("chapters");
box.innerHTML="";
novels[currentNovel].chapters.forEach((c,i)=>{
box.innerHTML+=`
<div class="card" onclick="openChapter(${i})">
Chapter ${i+1}
</div>`;
});
}

/* ================= CHAPTER ================= */
function openChapter(i){
currentChapter=i;

document.getElementById("novelPage").style.display="none";
document.getElementById("chapterPage").style.display="block";

showChapter();
}

function showChapter(){
let n=novels[currentNovel];

document.getElementById("chapterTitle").innerText=n.title+" - Chapter "+(currentChapter+1);
document.getElementById("chapterText").innerText=n.chapters[currentChapter];

loadComments();
}

/* ================= COMMENTS ================= */
function addComment(){
if(!currentUser){alert("Login first!");return;}

let key="c_"+currentNovel+"_"+currentChapter;
let data=JSON.parse(localStorage.getItem(key)||"[]");

data.push(currentUser+": "+document.getElementById("commentInput").value);

localStorage.setItem(key,JSON.stringify(data));
document.getElementById("commentInput").value="";
loadComments();
}

function loadComments(){
let key="c_"+currentNovel+"_"+currentChapter;
let data=JSON.parse(localStorage.getItem(key)||"[]");

let box=document.getElementById("comments");
box.innerHTML="";

data.forEach(c=>{
box.innerHTML+=`<div class="comment">${c}</div>`;
});
}

/* ================= RATING ================= */
function rateNovel(){
let v=parseInt(document.getElementById("rateInput").value);
if(!v)return;

novels[currentNovel].ratings.push(v);

let sum=novels[currentNovel].ratings.reduce((a,b)=>a+b,0);
novels[currentNovel].rating=(sum/novels[currentNovel].ratings.length).toFixed(1);

document.getElementById("rating").innerText=novels[currentNovel].rating;
}

/* ================= NAV ================= */
function backHome(){
document.getElementById("novelPage").style.display="none";
document.getElementById("grid").style.display="grid";
}

function backNovel(){
document.getElementById("chapterPage").style.display="none";
document.getElementById("novelPage").style.display="block";
}

/* ================= SEARCH ================= */
document.getElementById("search").addEventListener("input",renderGrid);

</script>

</body>
                      </html>
